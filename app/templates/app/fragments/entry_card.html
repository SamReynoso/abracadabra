<div class="relative" id="entryCard{{ entry.safe_slug }}">

  <ul class="collapse-navigation-list" id="collapse{{ entry.safe_slug }}" data-collapse-id="collapse{{ entry.safe_slug }}">

    <li>
      <button
        class="btn-link"
        hx-get="{% url 'entry_assign_form' %}?entry_slug={{ entry.safe_slug }}"
        hx-target="#modalContent"
        hx-swap="innerHTML"
        onclick="document.getElementById('assignModal').showModal();"
        >
        Assign
      </button>
    </li>

    <li>
      <button
        class="btn-link"
        hx-get="{% url 'entry_confirm_form' %}?entry_slug={{ entry.safe_slug }}"
        hx-target="#content{{ entry.safe_slug }}"
        hx-swap="innerHTML"
        >
        Confirm
      </button>
    </li>

    <li>
      <button
        class="btn-link"
        hx-get="{% url 'entry_reject_form' %}?entry_slug={{ entry.safe_slug }}"
        hx-target="#content{{ entry.safe_slug }}"
        hx-swap="innerHTML"
        >
        Reject
      </button>
    </li>

  </ul>

  <details class="app-card">

    <summary class="app-card__summary">

      <div class="row gap-1 center"> 
        <h3 class="app-card__title">{{ entry.name }}</h3>
      </div>

      <span class="unassigned">{{ entry.status }}</span>

      <button
        class="ellipsis-icon"
        onclick="openAppDropdown(event)"
        alt="Menu icon for entry details"
        data-toggle="collapse{{ entry.safe_slug }}"
        >
      </button>

    </summary>

    <div id="content{{ entry.safe_slug }}" class="pad-1">

      <h4>Contact Information</h4>

      <ul class="pad-1">

        <li><strong>Name:</strong> {{ registration.owner.info.first_name}} {{ registration.owner.info.last_name }}</li>
        <li><strong>Email:</strong> {{ registration.owner.info.email }}</li>
        <li><strong>Phone:</strong> {{ registration.owner.info.phone }}</li>

      </ul>

    </div>

  </details>

</div>
