
<div class="app-card-container" id="days">
    <h2>Registration</h2>
    {% for registration in registrations %}
      {% for entry in registration.entries.all %}
      {% if entry.status == 'pending' %}
        {% include 'app/fragments/entry_card.html' with entry=entry registration=registration event=event %}
      {% endif %}
    {% endfor %}
  {% endfor %}
</div>
