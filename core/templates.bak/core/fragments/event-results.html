{% for result in events %}
  <section class="search-result">
    <h3>{{ result.org.name }}</h3>
    <div class="event-poster">
      <img class="search-poster" src="{{ result.poster_url }}" alt="Event Poster">
    </div>
    <h2>{{ result.title }} ({{ result.date }})</h2>
    <p class="event-description">
      {{ result.short_description }}
    </p>
  </section>
{% endfor %}

<div
  id="loadMore"
  hx-get="/discover/basketball/load-more/?page={{ next_page }}"
  hx-trigger="revealed"
  hx-target="#loadMore"
  hx-swap="outerHTML"
  >
  Loading more....
</div>
