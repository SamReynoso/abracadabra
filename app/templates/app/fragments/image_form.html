<div class="modal" id="imageDetailsContent">

  <form method="dialog mb-1">
    <button class="close-btn mb-1"></button>
  </form>

  <form class="mb-1" method="POST" action="{% url 'image_form' %}" enctype="multipart/form-data">

    {% csrf_token %}
    <input type="hidden" name="image_slug" value="{{ image.safe_slug }}" />

    <div class="large-image mb-1">
      <img id="preview" class="image-upload-preview" src="{{ image.image.url }}" alt="Image preview" />
    </div>

    <input class="form-control mb-1" name="caption" type="text" placeholder="Image caption" value="{{ image.caption }}" />

    <label>
      <input class="form-control mb-2" name="is_profile_picture" type="checkbox" {% if image.is_profile_picture %}checked{% endif %} />
      Set as profile picture
    </label><br>

    <button class="btn" >Update</button>

  </form>

  <form action="{% url 'image_delete' %}" method="POST" enctype="multipart/form-data">

    {% csrf_token %}
    <input type="hidden" name="image_slug" value="{{ image.safe_slug }}" />

    <button class="btn btn-danger" type="submit" onclick="return confirm('Are you sure you want to delete this image?');">
      Delete
    </button>

  </form>

</div>
