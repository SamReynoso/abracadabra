{% extends 'app/base.html' %}

{% block header %}
  <!-- Organization Details Card -->
  
  <div class="row gap-1 pad-1">
    <img class="poster small" src="{{ event.poster_url }}" alt="{{ event.name }} Poster">
    <div>
      <h1>{{ event.name }}</h1>
      <dl class="grid">
        <dt>Type:</dt>
        <dd>{{ event.event_type }}</dd>
        <dt>Start Date:</dt>
        <dd>{{ event.start_date }}</dd>
        <dt>End Date:</dt>
        <dd>{{ event.end_date }}</dd>
    </div>
  </div>

{% endblock%}

{% block content %}

<section
  id="pendingAndConfirmed"
  hx-get="{% url 'pending_confirmed' event.safe_slug %}"
  hx-target="#pendingAndConfirmed"
  hx-swap="innerHTML"
  hx-trigger="load"
  >
</section>


<dialog class="modal" id="assignModal">
    <form method="dialog">
        <button class="btn">Close</button>
    </form>
    <div class="modal-content" id="modalContent">
    </div>
</dialog>

{% endblock content%}
