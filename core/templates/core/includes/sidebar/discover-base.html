<form class="sidebar-search" method="GET" action="/search">
  <!-- Sport selection -->
  <label for="sport">Sport</label>
  <select id="sport" name="sport">
    <option value="">Any</option>
    <option value="basketball">Basketball</option>
    <option value="bjj">Brazilian Jiu-Jitsu</option>
    <option value="running">Running</option>
    <option value="soccer">Soccer</option>
    <!-- Add more -->
  </select>

  <!-- Location -->
  <label for="location">Location</label>
  <input type="text" id="location" name="location" placeholder="City, zip, etc." />

  <!-- Date range -->
  <label for="date_start">Date Range</label>
  <input type="date" id="date_start" name="date_start" />
  <input type="date" id="date_end" name="date_end" />

  <!-- Age group -->
  <label for="age_group">Age Group</label>
  <select id="age_group" name="age_group">
    <option value="">Any</option>
    <option value="youth">Youth (Under 18)</option>
    <option value="adult">Adult (18+)</option>
    <option value="masters">Masters (35+)</option>
  </select>

  <!-- Skill level -->
  <label for="skill_level">Skill Level</label>
  <select id="skill_level" name="skill_level">
    <option value="">Any</option>
    <option value="beginner">Beginner</option>
    <option value="intermediate">Intermediate</option>
    <option value="advanced">Advanced</option>
  </select>

  <!-- Gender division -->
  <label for="division">Division</label>
  <select id="division" name="division">
    <option value="">Any</option>
    <option value="mens">Men’s</option>
    <option value="womens">Women’s</option>
    <option value="coed">Co-ed</option>
  </select>

  <!-- Format -->
  <label for="format">Format</label>
  <select id="format" name="format">
    <option value="">Any</option>
    <option value="pickup">Pickup Game</option>
    <option value="tournament">Tournament</option>
    <option value="league">League</option>
    <option value="camp">Camp</option>
    <option value="meetup">Meetup / Rec Event</option>
  </select>

  <!-- Poster filter -->
  <label>
    <input type="checkbox" name="has_poster" value="1" />
    Only show events with posters
  </label>

  <!-- Results type -->
  <label>
    <input type="checkbox" name="has_results" value="1" />
    Only show events with results
  </label>

  <!-- Submit -->
  <button type="submit">Search</button>
</form>
