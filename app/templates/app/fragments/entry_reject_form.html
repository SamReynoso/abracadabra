<div id="content{{ entry.safe_slug }}">

  <form>

    {% csrf_token %}
    <input type="hidden" name="event_slug" value="{{ event.safe_slug }}">
    <input type="hidden" name="entry_slug" value="{{ entry.safe_slug }}">

    <h3>Reject Entry</h3>

    <p>Reject this registration entry into the event.</p>

    <button type="submit" class="btn danger" id="reject-entry-button">
      Reject Entry
    </button>

  <form>

</div>
